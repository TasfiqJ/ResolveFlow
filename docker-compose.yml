services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: resolveflow
      POSTGRES_USER: resolveflow
      POSTGRES_PASSWORD: resolveflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolveflow -d resolveflow"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - resolveflow_pgdata:/var/lib/postgresql/data
  api:
    build: .
    environment:
      RESOLVEFLOW_ENVIRONMENT: local
      RESOLVEFLOW_DATABASE_URL: postgresql+asyncpg://resolveflow:resolveflow@db:5432/resolveflow
    command: uvicorn resolveflow.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
  worker:
    build: .
    environment:
      RESOLVEFLOW_ENVIRONMENT: local
      RESOLVEFLOW_DATABASE_URL: postgresql+asyncpg://resolveflow:resolveflow@db:5432/resolveflow
    command: python -m resolveflow.worker.main
    depends_on:
      db:
        condition: service_healthy
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  resolveflow_pgdata:

